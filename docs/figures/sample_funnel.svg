<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title">
<title id="title">Sample Construction</title>
<rect width="1400" height="760" fill="#FFFFFF"/>
<style>
.title{font:700 42px Arial,sans-serif;fill:#111827}
.sub{font:400 22px Arial,sans-serif;fill:#5B677A}
.stage{font:700 22px Arial,sans-serif;fill:#111827}
.barval{font:700 25px Arial,sans-serif;fill:#FFFFFF}
.footer{font:700 25px Arial,sans-serif;fill:#14284B}
</style>
<text x="700" y="72" text-anchor="middle" class="title">Sample Construction</text>
<text x="700" y="114" text-anchor="middle" class="sub">From I/B/E/S announcements to final clean event sample</text>
<text x="80" y="207" class="stage">I/B/E/S actual EPS announcements</text>
<rect x="400" y="165" width="760.0" height="68" rx="15" fill="#2F5BEA"/>
<text x="1135.0" y="208" text-anchor="end" class="barval">501,536</text>
<text x="80" y="312" class="stage">Matched to pre-announcement consensus</text>
<rect x="400" y="270" width="623.4" height="68" rx="15" fill="#3A74F2"/>
