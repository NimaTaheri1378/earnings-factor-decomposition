<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title">
<title id="title">Announcement effects persist; residual PEAD does not</title>
<defs>
<style>
.title{font:700 38px Arial,sans-serif;fill:#111827}
.axis{font:600 20px Arial,sans-serif;fill:#334155}
.tick{font:500 18px Arial,sans-serif;fill:#64748B}
.group{font:700 23px Arial,sans-serif;fill:#111827}
.value{font:700 22px Arial,sans-serif;fill:#111827}
.legend{font:600 19px Arial,sans-serif;fill:#334155}
</style>
</defs>
<rect width="1400" height="820" fill="#ffffff"/>
<text x="70" y="75" class="title">Announcement effects persist; residual PEAD does not</text>

<!-- plot frame -->
<g transform="translate(120,140)">
<line x1="0" y1="560" x2="1180" y2="560" stroke="#334155" stroke-width="2"/>
<line x1="0" y1="0" x2="0" y2="560" stroke="#CBD5E1" stroke-width="2"/>

<!-- grid and ticks -->
<g stroke="#D9E2EF" stroke-width="1.4">
<line x1="0" y1="80" x2="1180" y2="80"/>
<line x1="0" y1="240" x2="1180" y2="240"/>
<line x1="0" y1="400" x2="1180" y2="400"/>
</g>
<text x="-48" y="565" class="tick">0</text>
<text x="-48" y="405" class="tick">2</text>
<text x="-48" y="245" class="tick">4</text>
<text x="-48" y="85" class="tick">6</text>
<text x="-90" y="305" class="axis" transform="rotate(-90 -90 305)">Q5 − Q1 spread (percentage points)</text>

<!-- scale: y = 560 - value*80 -->
<!-- Announcement bars -->
<rect x="160" y="53.6" width="120" height="506.4" rx="10" fill="#2F5BEA"/>
<rect x="320" y="57.6" width="120" height="502.4" rx="10" fill="#6EA8F7"/>
<rect x="480" y="60.0" width="120" height="500.0" rx="10" fill="#0F7C74"/>
<text x="220" y="38" class="value" text-anchor="middle">6.33</text>
<text x="380" y="42" class="value" text-anchor="middle">6.28</text>
<text x="540" y="44" class="value" text-anchor="middle">6.25</text>

<!-- PEAD bars -->
<rect x="760" y="406.4" width="120" height="153.6" rx="10" fill="#2F5BEA"/>
<rect x="920" y="408.0" width="120" height="152.0" rx="10" fill="#6EA8F7"/>
<rect x="1080" y="560" width="120" height="7" rx="4" fill="#C94141"/>
<text x="820" y="390" class="value" text-anchor="middle">1.92</text>
<text x="980" y="392" class="value" text-anchor="middle">1.90</text>
<text x="1140" y="600" class="value" text-anchor="middle">−0.08</text>

<!-- group labels -->
<text x="380" y="640" class="group" text-anchor="middle">Announcement [−1,+1]</text>
<text x="980" y="640" class="group" text-anchor="middle">PEAD [+2,+60]</text>

<!-- bar labels -->
<text x="220" y="595" class="tick" text-anchor="middle">Raw</text>
<text x="380" y="595" class="tick" text-anchor="middle">Mkt-adj.</text>
<text x="540" y="595" class="tick" text-anchor="middle">FF5+Mom</text>
<text x="820" y="595" class="tick" text-anchor="middle">Raw</text>
<text x="980" y="595" class="tick" text-anchor="middle">Mkt-adj.</text>
<text x="1140" y="635" class="tick" text-anchor="middle">FF5+Mom</text>
</g>

</svg>