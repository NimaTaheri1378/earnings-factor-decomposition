<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title">
<title id="title">Announcement and PEAD Spreads</title>
<rect width="1400" height="760" fill="#FFFFFF"/>
<style>
.title{font:700 42px Arial,sans-serif;fill:#111827}
.axis{font:400 21px Arial,sans-serif;fill:#5B677A}
.panel{font:700 26px Arial,sans-serif;fill:#111827}
.tick{font:400 19px Arial,sans-serif;fill:#5B677A}
.val{font:700 25px Arial,sans-serif;fill:#111827}
.ylabel{font:400 24px Arial,sans-serif;fill:#111827}
</style>
<text x="700" y="70" text-anchor="middle" class="title">Announcement Effects Persist; Residual PEAD Does Not</text>
<text x="700" y="118" text-anchor="middle" class="axis">Q5−Q1 spreads in percentage points</text>
<line x1="140" y1="600.0" x2="1280" y2="600.0" stroke="#D9E2EF" stroke-width="2"/>
<text x="105" y="608.0" class="axis">0</text>
<line x1="140" y1="480.0" x2="1280" y2="480.0" stroke="#D9E2EF" stroke-width="2"/>
<text x="105" y="488.0" class="axis">2</text>
<line x1="140" y1="360.0" x2="1280" y2="360.0" stroke="#D9E2EF" stroke-width="2"/>
<text x="105" y="368.0" class="axis">4</text>
<line x1="140" y1="240.0" x2="1280" y2="240.0" stroke="#D9E2EF" stroke-width="2"/>
<text x="105" y="248.0" class="axis">6</text>
<line x1="140" y1="600" x2="1280" y2="600" stroke="#334155" stroke-width="2"/>
<line x1="140" y1="180" x2="140" y2="600" stroke="#CBD5E1" stroke-width="2"/>
<text x="430" y="158" text-anchor="middle" class="panel">Announcement [−1,+1]</text>
<text x="1060" y="158" text-anchor="middle" class="panel">PEAD [+2,+60]</text>
<rect x="245" y="220.2" width="105" height="379.8" rx="12" fill="#2F5BEA"/>
<text x="297.5" y="202.2" text-anchor="middle" class="val">6.33</text>
<text x="297.5" y="650" text-anchor="middle" class="tick">Raw</text>
<rect x="400" y="223.2" width="105" height="376.8" rx="12" fill="#6AA4F6"/>
<text x="452.5" y="205.2" text-anchor="middle" class="val">6.28</text>
<text x="452.5" y="650" text-anchor="middle" class="tick">Market-adjusted</text>
<rect x="555" y="225.0" width="105" height="375.0" rx="12" fill="#0F7C74"/>
<text x="607.5" y="207.0" text-anchor="middle" class="val">6.25</text>
<text x="607.5" y="650" text-anchor="middle" class="tick">FF5+Mom</text>
<rect x="875" y="484.8" width="105" height="115.2" rx="12" fill="#2F5BEA"/>
<text x="927.5" y="466.8" text-anchor="middle" class="val">1.92</text>
<text x="927.5" y="650" text-anchor="middle" class="tick">Raw</text>
<rect x="1030" y="486.0" width="105" height="114.0" rx="12" fill="#6AA4F6"/>
<text x="1082.5" y="468.0" text-anchor="middle" class="val">1.90</text>
<text x="1082.5" y="650" text-anchor="middle" class="tick">Market-adjusted</text>
<rect x="1185" y="600.0" width="105" height="8" rx="12" fill="#0F7C74"/>
<text x="1237.5" y="643.0" text-anchor="middle" class="val">−0.08</text>
<text x="1237.5" y="675" text-anchor="middle" class="tick">FF5+Mom</text>
<text x="52" y="390" transform="rotate(-90 52,390)" text-anchor="middle" class="ylabel">Q5−Q1 spread</text>
</svg>