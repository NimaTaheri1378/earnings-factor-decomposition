<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title">
<title id="title">FF5 plus momentum decomposition of Q5 minus Q1 spreads</title>
<defs>
<style>
.title{font:700 38px Arial,sans-serif;fill:#111827}
.head{font:700 21px Arial,sans-serif;fill:#111827}
.window{font:700 22px Arial,sans-serif;fill:#111827}
.label{font:600 17px Arial,sans-serif;fill:#64748B}
.big{font:700 30px Arial,sans-serif;fill:#111827}
.neg{font:700 30px Arial,sans-serif;fill:#B42323}
</style>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
<feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
</filter>
</defs>
<rect width="1400" height="860" fill="#ffffff"/>
<text x="70" y="78" class="title">FF5+Momentum decomposition of Q5−Q1 spreads</text>

<!-- column headers -->
<text x="90" y="150" class="head">Window</text>
<text x="405" y="150" class="head" text-anchor="middle">Raw spread</text>
<text x="620" y="150" class="head" text-anchor="middle">Factor exposure</text>
<text x="845" y="150" class="head" text-anchor="middle">Alpha/intercept</text>
<text x="1075" y="150" class="head" text-anchor="middle">Residual AR</text>
<text x="1280" y="150" class="head" text-anchor="middle">Residual share</text>

<!-- rows background -->
<g filter="url(#shadow)">
<rect x="60" y="175" width="1280" height="165" rx="24" fill="#F8FAFD" stroke="#D7E0EC"/>
<rect x="60" y="365" width="1280" height="165" rx="24" fill="#F8FAFD" stroke="#D7E0EC"/>
<rect x="60" y="555" width="1280" height="165" rx="24" fill="#F8FAFD" stroke="#D7E0EC"/>
</g>

<!-- row 1 -->
<text x="90" y="245" class="window">Announcement</text>
<text x="90" y="280" class="label">[−1,+1]</text>
<text x="405" y="262" class="big" text-anchor="middle">6.42</text>
<rect x="560" y="220" width="120" height="70" rx="16" fill="#D7E9FF"/><text x="620" y="263" class="big" text-anchor="middle">0.10</text>
<rect x="785" y="220" width="120" height="70" rx="16" fill="#FFE2B8"/><text x="845" y="263" class="big" text-anchor="middle">0.07</text>
<rect x="1015" y="220" width="120" height="70" rx="16" fill="#DDF7E8"/><text x="1075" y="263" class="big" text-anchor="middle">6.25</text>
<text x="1280" y="262" class="big" text-anchor="middle">97.4%</text>

<!-- row 2 -->
<text x="90" y="435" class="window">60-day PEAD</text>
<text x="90" y="470" class="label">[+2,+60]</text>
<text x="405" y="452" class="big" text-anchor="middle">1.99</text>
<rect x="560" y="410" width="120" height="70" rx="16" fill="#D7E9FF"/><text x="620" y="453" class="big" text-anchor="middle">0.63</text>
<rect x="785" y="410" width="120" height="70" rx="16" fill="#FFE2B8"/><text x="845" y="453" class="big" text-anchor="middle">1.44</text>
<rect x="1015" y="410" width="120" height="70" rx="16" fill="#FFE6E6"/><text x="1075" y="453" class="neg" text-anchor="middle">−0.08</text>
<text x="1280" y="452" class="neg" text-anchor="middle">−3.9%</text>

<!-- row 3 -->
<text x="90" y="625" class="window">252-day PEAD</text>
<text x="90" y="660" class="label">[+2,+252]</text>
<text x="405" y="642" class="big" text-anchor="middle">6.96</text>
<rect x="560" y="600" width="120" height="70" rx="16" fill="#D7E9FF"/><text x="620" y="643" class="big" text-anchor="middle">1.27</text>
<rect x="785" y="600" width="120" height="70" rx="16" fill="#FFE2B8"/><text x="845" y="643" class="big" text-anchor="middle">6.24</text>
<rect x="1015" y="600" width="120" height="70" rx="16" fill="#FFE6E6"/><text x="1075" y="643" class="neg" text-anchor="middle">−0.55</text>
<text x="1280" y="642" class="neg" text-anchor="middle">−7.9%</text>

</svg>