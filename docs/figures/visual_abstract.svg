<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title">
<title id="title">Residual Information in Earnings Announcements</title>
<defs>
<style>
.bg{fill:#ffffff}
.title{font:700 40px Arial,sans-serif;fill:#111827}
.card-title{font:700 22px Arial,sans-serif;fill:#111827}
.big{font:700 46px Arial,sans-serif;fill:#14284B}
.med{font:500 22px Arial,sans-serif;fill:#334155}
.small{font:500 20px Arial,sans-serif;fill:#5B677A}
</style>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
<feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
</filter>
</defs>
<rect class="bg" width="1400" height="760"/>
<text x="70" y="80" class="title">Residual Information in Earnings Announcements</text>

<g filter="url(#shadow)">
<rect x="70" y="135" width="570" height="210" rx="26" fill="#F8FAFD" stroke="#D7E0EC"/>
<rect x="760" y="135" width="570" height="210" rx="26" fill="#F8FAFD" stroke="#D7E0EC"/>
<rect x="70" y="415" width="570" height="210" rx="26" fill="#F8FAFD" stroke="#D7E0EC"/>
<rect x="760" y="415" width="570" height="210" rx="26" fill="#F8FAFD" stroke="#D7E0EC"/>
</g>

<text x="115" y="190" class="card-title">Final clean sample</text>
<text x="115" y="258" class="big">238,529</text>
<text x="115" y="304" class="small">earnings-announcement events</text>

<text x="805" y="190" class="card-title">Announcement window [−1,+1]</text>
<text x="805" y="258" class="big">6.25 pp</text>
<text x="805" y="304" class="small">FF5+Momentum residual Q5−Q1 spread</text>

<text x="115" y="470" class="card-title">Post-announcement drift [+2,+60]</text>
<text x="115" y="538" class="big">−0.08 pp</text>
<text x="115" y="584" class="small">FF5+Momentum residual Q5−Q1 spread</text>

<text x="805" y="470" class="card-title">Decomposition result</text>
<text x="805" y="538" class="big">97.4%</text>
<text x="805" y="584" class="small">of the announcement raw spread is residual AR</text>

</svg>