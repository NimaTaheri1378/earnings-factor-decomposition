<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title">
<title id="title">Residual Information in Earnings Announcements</title>
<rect width="1400" height="720" fill="#FFFFFF"/>
<style>
.title{font:700 46px Arial,sans-serif;fill:#111827}
.sub{font:400 21px Arial,sans-serif;fill:#5B677A}
.cardTitle{font:700 24px Arial,sans-serif;fill:#111827}
.big{font:700 46px Arial,sans-serif;fill:#14284B}
.small{font:400 23px Arial,sans-serif;fill:#5B677A}
</style>
<text x="70" y="82" class="title">Residual Information in Earnings Announcements</text>
<text x="70" y="122" class="sub">Earnings surprise returns, expected-return compensation, and post-announcement drift in U.S. equities, 2000–2024</text>
<rect x="70" y="185" width="580" height="180" rx="26" fill="#F8FAFD" stroke="#D7E0EC" stroke-width="2"/>
<text x="110" y="235" class="cardTitle">Final clean sample</text>
<text x="110" y="295" class="big">238,529</text>
<text x="110" y="335" class="small">earnings-announcement events</text>
<rect x="750" y="185" width="580" height="180" rx="26" fill="#F8FAFD" stroke="#D7E0EC" stroke-width="2"/>
<text x="790" y="235" class="cardTitle">Announcement spread</text>
<text x="790" y="295" class="big">6.25 pp</text>
<text x="790" y="335" class="small">FF5+Momentum residual Q5−Q1</text>
<rect x="70" y="410" width="580" height="180" rx="26" fill="#F8FAFD" stroke="#D7E0EC" stroke-width="2"/>
<text x="110" y="460" class="cardTitle">60-day drift after factors</text>
<text x="110" y="520" class="big" fill="#C94141">−0.08 pp</text>
<text x="110" y="560" class="small">FF5+Momentum residual Q5−Q1</text>
<rect x="750" y="410" width="580" height="180" rx="26" fill="#F8FAFD" stroke="#D7E0EC" stroke-width="2"/>
<text x="790" y="460" class="cardTitle">Core interpretation</text>
<text x="790" y="520" class="big">97.4%</text>
<text x="790" y="560" class="small">of announcement raw spread is residual AR</text>
</svg>